name: Publish to TestPyPi

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to publish with on TestPyPi.  Cannot be a value used previously.  Consider the date followed by a number, e.g. 3.3.21.1'
        required: true

jobs:
  Publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v2
        with:
          ref: "main"
      - name: Set version
        run: echo ${{ github.event.inputs.version }} > version.txt
      - name: Install Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.6
      - name: Upgrade wheel
        run: pip install --upgrade wheel==0.34.2 setuptools
      - name: Build wheel file
        run: python setup.py bdist_wheel sdist
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@master
        with:
          repository_url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          user: __token__

